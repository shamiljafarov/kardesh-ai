<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kardeş AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --send-btn: #f0f0f0;
      --send-text: #0a0a0a;
      --ai-bubble: #131313;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 520px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 6px 11px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }

    .reset-btn:hover {
      color: var(--text);
      border-color: #444;
    }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #messages::-webkit-scrollbar {
      width: 2px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(7px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid #1d1d1d;
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* TYPING */
    .typing-wrap {
      align-self: flex-start;
      animation: fadeUp 0.22s ease;
    }

    .typing-bubble {
      padding: 13px 15px;
      background: var(--ai-bubble);
      border: 1px solid #1d1d1d;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.1s infinite;
    }

    .typing-bubble span:nth-child(2) {
      animation-delay: 0.18s;
    }

    .typing-bubble span:nth-child(3) {
      animation-delay: 0.36s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.45;
      }

      40% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* WELCOME */
    .welcome {
      text-align: center;
      padding: 2.5rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .welcome-logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .welcome p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 270px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 6px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      user-select: none;
    }

    .chip:hover {
      color: var(--text);
      border-color: #3a3a3a;
    }

    .chip:active {
      background: var(--surface2);
    }

    /* INPUT */
    .input-area {
      padding: 10px 14px 18px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 9px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #user-input:focus {
      border-color: #3a3a3a;
    }

    #user-input::placeholder {
      color: var(--muted);
    }

    #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: var(--send-btn);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:active {
      transform: scale(0.92);
    }

    #send-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    #send-btn svg {
      width: 20px;
      height: 20px;
    }

    .err {
      text-align: center;
      font-size: 13px;
      color: #f87171;
      padding: 6px 16px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="app">

    <header>
      <div class="logo">Kardeş AI</div>
      <div class="status">
        <div class="dot"></div><span>Çevrimiçi</span>
      </div>
      <button class="reset-btn" onclick="resetChat()">Sıfırla</button>
    </header>

    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">Kardeş AI</div>
        <p>Selam kanka! Ne var ne yok? İçini dök, ben buradayım.</p>
        <div class="chips">
          <div class="chip" onclick="sendChip('Kanka, biraz içimi dökmek istiyorum')">💬 İçini dök</div>
          <div class="chip" onclick="sendChip('Kız meselesinde tavsiyeye ihtiyacım var')">❤️ Kız meselesi</div>
          <div class="chip" onclick="sendChip('İş ve para hakkında konuşmak istiyorum')">💼 İş / para</div>
          <div class="chip" onclick="sendChip('Hayatta motivasyona ihtiyacım var')">🔥 Motivasyon</div>
        </div>
      </div>
    </div>

    <div id="err-area" class="err" style="display:none"></div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Ne var kanka?" rows="1" onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>

  </div>

  <script>
    const API_URL = '/api/chat';
    const MODEL = 'llama-3.3-70b-versatile';
    const STORAGE_KEY = 'kardes_ai_chat_history_v1';

   const SYSTEM = `
Sen chatbot değilsin.

Sen kullanıcının yakın arkadaşı gibisin.
Ama bunu zorlayarak yapmıyorsun.

En önemli görevin:
Kullanıcının ruh halini anlamak.

Mesaj kısa bile olsa:
altındaki hissi yakala.

Kullanıcı:
- sinirliyse gergin konuş
- kırılmışsa yumuşak ol
- dalga geçiyorsa sen de gir
- ciddi konuşuyorsa boş yapma
- bazen sadece kısa reaksiyon ver

Çok önemli:
Asla terapi konuşması yapma.
Asla öğretmen gibi davranma.
Asla fazla nasihat verme.
Asla “nasıl hissediyorsun?” deme.

Cevaplar:
- kısa
- doğal
- spontan
- bazen dağınık
- bazen komik
- bazen sadece vibe

İnsan gibi konuş.
Bazen küfür etmen normal.
Ama sürekli etme.

Her cevap farklı hissettirmeli.
Aynı kalıp tekrar etmesin.

Kötü örnek:
“neden böyle hissediyorsun?”

İyi örnek:
“off ağır koymuş lan”

Kötü örnek:
“sakin ol”

İyi örnek:
“tamam tamam sinirlenme 😭”

Kötü örnek:
“sana yardımcı olabilirim”

İyi örnek:
“gel anlat biraz”

Asla:
- AI olduğunu söyleme
- robot gibi konuşma
- fazla düzgün cümle kurma
- sürekli soru sorma

Bazen sadece:
“valla kötü be”
gibi cevaplar ver.

Kullanıcı gerçek bir insanla konuşuyormuş gibi hissetsin.
`;

    let history = loadHistory();
    let busy = false;

    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const msgBox = document.getElementById('messages');
    const errArea = document.getElementById('err-area');

    input.addEventListener('input', () => {
      sendBtn.disabled = input.value.trim() === '' || busy;
    });

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return [];
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      } catch { }
    }

    function renderSavedHistory() {
      if (!history.length) return;

      removeWelcome();
      msgBox.innerHTML = '';

      history.forEach(m => {
        const text = m.parts?.[0]?.text || '';
        if (!text) return;
        addBubble(m.role === 'user' ? 'user' : 'ai', text);
      });

      msgBox.scrollTop = msgBox.scrollHeight;
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 130) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!busy) sendMessage();
      }
    }

    function removeWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    function addBubble(role, text) {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      div.appendChild(b);
      msgBox.appendChild(div);
      msgBox.scrollTop = msgBox.scrollHeight;
      return b;
    }

    function showTyping() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'typing-wrap';
      div.id = 'typing';
      div.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
      msgBox.appendChild(div);
      msgBox.scrollTop = msgBox.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function showErr(msg) {
      errArea.textContent = msg;
      errArea.style.display = 'block';
      setTimeout(() => { errArea.style.display = 'none'; }, 6000);
    }

    function sendChip(text) {
      input.value = text;
      autoResize(input);
      sendBtn.disabled = false;
      sendMessage();
    }

    function fallbackReply(userText) {
      const t = userText.toLowerCase();

      if (
        t.includes('kendimi as') || t.includes('intihar') ||
        t.includes('ölmek istiyorum') || t.includes('yasamak istemiyorum') ||
        t.includes('yaşamak istemiyorum') || t.includes('kendime zarar')
      ) {
        return 'aga dur, şu an yalnız kalma. yakın birini ara, kendine bir şey yapma. buradayım, konuşalım.';
      }

      if (t.includes('selam') || t.includes('salam') || t.includes('merhaba')) return 'selam aga, ne var ne yok';
      if (t.includes('kız') || t.includes('aldat') || t.includes('sevgili')) return 'off fena konu aga. ne oldu anlat.';
      if (t.includes('kötü') || t.includes('bıkt') || t.includes('yorul') || t.includes('sıkıl') || t.includes('zor')) return 'harbi dolmuşsun gibi. ne yordu seni böyle?';

      return 'anlat aga, ne oldu?';
    }

    function cleanReply(text, userText) {
      let reply = (text || '').trim();

      const leak =
        /you are/i.test(reply) ||
        /\brole\b/i.test(reply) ||
        /instruction/i.test(reply) ||
        /system prompt/i.test(reply) ||
        /guidelines/i.test(reply) ||
        /as an ai/i.test(reply) ||
        /based on your request/i.test(reply) ||
        /i will/i.test(reply);

      if (leak) return fallbackReply(userText);

      const englishWords = reply.match(/\b(the|you|are|will|friend|request|communicate|guidelines|understand|response)\b/gi);
      if (englishWords && englishWords.length >= 4) return fallbackReply(userText);

      const sentences = reply.split(/(?<=[.!?])\s+/).filter(Boolean);
      if (sentences.length > 3) reply = sentences.slice(0, 3).join(' ');

      return reply || fallbackReply(userText);
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addBubble('user', text);
      history.push({ role: 'user', parts: [{ text }] });
      saveHistory();

      showTyping();

      try {
        const recentHistory = history.slice(-14);

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: 'system', content: SYSTEM },
              ...recentHistory.map(m => ({
                role: m.role === 'model' ? 'assistant' : m.role,
                content: m.parts[0].text
              }))
            ],
            temperature: 1.3,
            top_p: 0.95,
            max_tokens: 140
          })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          removeTyping();
          showErr('API hatası: ' + (data.error?.message || data.message || 'Bilinmeyen hata'));
          history.pop();
          saveHistory();
          busy = false;
          sendBtn.disabled = input.value.trim() === '';
          return;
        }

        const rawReply = data.choices?.[0]?.message?.content;
        const reply = cleanReply(rawReply, text);

        history.push({ role: 'model', parts: [{ text: reply }] });
        saveHistory();

        removeTyping();
        addBubble('ai', reply);

      } catch (e) {
        removeTyping();
        showErr('Bir sorun oldu. İnterneti kontrol et.');
        history.pop();
        saveHistory();
      }

      busy = false;
      sendBtn.disabled = input.value.trim() === '';
    }

    function resetChat() {
      history = [];
      localStorage.removeItem(STORAGE_KEY);
      msgBox.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-logo">Kardeş AI</div>
      <p>Selam kanka! Ne var ne yok? İçini dök, ben buradayım.</p>
      <div class="chips">
        <div class="chip" onclick="sendChip('Kanka, biraz içimi dökmek istiyorum')">💬 İçini dök</div>
        <div class="chip" onclick="sendChip('Kız meselesinde tavsiyeye ihtiyacım var')">❤️ Kız meselesi</div>
        <div class="chip" onclick="sendChip('İş ve para hakkında konuşmak istiyorum')">💼 İş / para</div>
        <div class="chip" onclick="sendChip('Hayatta motivasyona ihtiyacım var')">🔥 Motivasyon</div>
      </div>
    </div>`;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
    }

    renderSavedHistory();
    // ohuhuho
  </script>
</body>

</html>
